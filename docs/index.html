<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q2 Performance Levers · Hinge Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --hh-green:      #007B34;
      --hh-green-dark: #00491F;
      --hh-green-mid:  #00A749;
      --hh-green-pale: #BDE9C9;
      --hh-cream:      #FFFBED;
      --hh-white:      #ffffff;
      --text-primary:  #0a1628;
      --text-secondary:#4a5568;
      --text-muted:    #8a9ab0;
      --border:        #e8eeea;
      --shadow:        0 1px 4px rgba(0,75,30,.07), 0 1px 2px rgba(0,75,30,.04);
      --shadow-md:     0 4px 16px rgba(0,75,30,.10), 0 1px 3px rgba(0,75,30,.06);
    }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: var(--hh-cream);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--hh-green-dark);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 0;
      height: 64px;
      border-bottom: 3px solid var(--hh-green);
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .logo-leaf {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }
    .logo-wordmark {
      font-size: 1.05rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.01em;
    }
    .header-divider {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,.25);
      margin: 0 20px;
    }
    .header-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: rgba(255,255,255,.85);
      flex: 1;
    }
    .header-meta {
      font-size: 0.78rem;
      color: rgba(255,255,255,.5);
    }

    /* ── Layout ── */
    main { max-width: 1160px; margin: 0 auto; padding: 28px 20px 60px; }
    section { margin-bottom: 24px; }
    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--hh-green);
      margin-bottom: 10px;
    }

    /* ── Cards ── */
    .card {
      background: var(--hh-white);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 20px 24px;
    }

    /* ── Metric Cards ── */
    .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .metric-card .label { font-size: 0.78rem; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
    .metric-card .value { font-size: 1.85rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text-primary); }
    .metric-card .sub { margin-top: 8px; font-size: 0.75rem; color: var(--text-secondary); }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
    }
    .badge-green  { background: var(--hh-green-pale); color: var(--hh-green-dark); }
    .badge-red    { background: #fde8e8; color: #9b1c1c; }
    .badge-yellow { background: #fef3c7; color: #92400e; }
    .gap-positive { color: var(--hh-green); }
    .gap-negative { color: #dc2626; }

    /* ── Tables ── */
    .tables-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .table-card h3 {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th {
      text-align: left;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 9px 0; border-bottom: 1px solid #f4f6f4; }
    tr:last-child td { border-bottom: none; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .total-row td { font-weight: 700; color: var(--text-primary); padding-top: 10px; border-top: 1px solid var(--border); border-bottom: none; }

    /* ── Lever Section ── */
    .lever-section { display: grid; grid-template-columns: 310px 1fr; gap: 14px; align-items: start; }
    .lever-list { display: flex; flex-direction: column; gap: 10px; }

    .lever-card {
      background: var(--hh-white);
      border-radius: 14px;
      border: 2px solid transparent;
      box-shadow: var(--shadow);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s, transform .1s;
    }
    .lever-card:hover {
      border-color: var(--hh-green-pale);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .lever-card.active {
      border-color: var(--hh-green);
      box-shadow: 0 0 0 3px rgba(0,123,52,.12), var(--shadow);
    }
    .lever-card .lever-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 2px; color: var(--text-primary); }
    .lever-card .lever-subtitle { font-size: 0.76rem; color: var(--text-secondary); margin-bottom: 9px; }
    .lever-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }
    .chip-rec     { background: var(--hh-green-pale); color: var(--hh-green-dark); }
    .chip-neutral { background: #f0f4f1; color: #4a5568; }
    .chip-urgent  { background: #fef3c7; color: #92400e; }

    /* ── Playbook Panel ── */
    .playbook-panel {
      background: var(--hh-white);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 26px 30px;
      min-height: 360px;
    }
    .pb-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--hh-green-pale);
    }
    .pb-name {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.3;
    }
    .pb-section {
      margin-bottom: 20px;
    }
    .pb-section-title {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--hh-green);
      margin-bottom: 6px;
    }
    .pb-body {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.65;
    }
    .pb-action-box {
      background: #f0f9f4;
      border-left: 3px solid var(--hh-green);
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      font-size: 0.875rem;
      color: var(--hh-green-dark);
      font-weight: 500;
    }
    .pb-steps { list-style: none; counter-reset: steps; }
    .pb-steps li {
      counter-increment: steps;
      display: flex;
      gap: 12px;
      margin-bottom: 9px;
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .pb-steps li::before {
      content: counter(steps);
      min-width: 22px;
      height: 22px;
      background: var(--hh-green-pale);
      color: var(--hh-green-dark);
      font-weight: 800;
      font-size: 0.7rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      padding: 20px;
    }
    footer a { color: var(--hh-green); text-decoration: none; font-weight: 500; }
    footer a:hover { text-decoration: underline; }

    /* ── Loading ── */
    #loading {
      text-align: center;
      padding: 80px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .metric-grid  { grid-template-columns: 1fr; }
      .tables-grid  { grid-template-columns: 1fr; }
      .lever-section{ grid-template-columns: 1fr; }
      header { padding: 0 16px; }
      .header-title { display: none; }
    }
  </style>
</head>
<body>

<header>
  <a class="header-logo" href="https://www.hingehealth.com" target="_blank">
    <!-- Hinge Health leaf/branch logo mark -->
    <svg class="logo-leaf" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 3C14 3 6 7 6 15C6 19.4183 9.58172 23 14 23C18.4183 23 22 19.4183 22 15C22 7 14 3 14 3Z" fill="#00A749"/>
      <path d="M14 23V13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M14 17C14 17 10 14 8 11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M14 14C14 14 17 12 19 10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span class="logo-wordmark">hinge health</span>
  </a>
  <div class="header-divider"></div>
  <div class="header-title" id="header-title">Q2 Performance Levers</div>
  <div class="header-meta" id="header-meta"></div>
</header>

<main>
  <div id="loading">Loading playbook data…</div>
  <div id="app" style="display:none">

    <!-- ── Metrics ── -->
    <section>
      <div class="section-label">Q2 At-a-Glance</div>
      <div class="metric-grid">
        <div class="card metric-card">
          <div class="label">Q2 OKR</div>
          <div class="value" id="m-okr">—</div>
          <div class="sub">Enrollment target</div>
        </div>
        <div class="card metric-card">
          <div class="label">Q2 Outlook</div>
          <div class="value" id="m-outlook">—</div>
          <div class="sub" id="m-outlook-calc"></div>
        </div>
        <div class="card metric-card">
          <div class="label">Gap to OKR</div>
          <div class="value" id="m-gap">—</div>
          <span class="badge" id="m-gap-badge"></span>
        </div>
      </div>
    </section>

    <!-- ── Tables ── -->
    <section>
      <div class="tables-grid">
        <div class="card table-card">
          <h3>Channel Touchpoints</h3>
          <table>
            <thead><tr>
              <th>Channel</th>
              <th class="num">Touchpoints</th>
              <th class="num">Shifted Enroll.</th>
            </tr></thead>
            <tbody id="touchpoints-body"></tbody>
          </table>
        </div>
        <div class="card table-card">
          <h3>Y2 Deferred Renewals by Sub End Date</h3>
          <table>
            <thead><tr>
              <th>Sub End Week</th>
              <th class="num">Actual Renewals</th>
            </tr></thead>
            <tbody id="y2-body"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- ── Lever Selector + Playbook ── -->
    <section>
      <div class="section-label">Choose a Lever</div>
      <div class="lever-section">
        <div class="lever-list" id="lever-list"></div>
        <div class="playbook-panel" id="playbook-panel">
          <div id="playbook-content"></div>
        </div>
      </div>
    </section>

  </div>
</main>

<footer id="footer"></footer>

<script>
const fmt     = n => Number(n).toLocaleString('en-US');
const fmtSign = n => (n >= 0 ? '+' : '') + fmt(n);

let allLevers = [];
let recommendedId = '';

function selectLever(id) {
  allLevers.forEach(l => {
    const card = document.getElementById('lever-' + l.id);
    if (card) card.classList.toggle('active', l.id === id);
  });
  const lever = allLevers.find(l => l.id === id);
  if (!lever) return;
  const isRec = id === recommendedId;
  document.getElementById('playbook-content').innerHTML = renderPlaybook(lever, isRec);
}

function renderPlaybook(lever, isRec) {
  const stepsHtml = lever.execution_steps.map(s => `<li>${s}</li>`).join('');
  return `
    <div class="pb-header">
      <div class="pb-name">${lever.name}</div>
      ${isRec ? '<span class="chip chip-rec">✓ Recommended</span>' : ''}
    </div>
    <div class="pb-section">
      <div class="pb-section-title">Rationale</div>
      <div class="pb-body">${lever.rationale}</div>
    </div>
    <div class="pb-section">
      <div class="pb-section-title">Estimated Impact</div>
      <div class="pb-body">${lever.estimated_impact}</div>
    </div>
    <div class="pb-section">
      <div class="pb-section-title">Action</div>
      <div class="pb-action-box">${lever.action}</div>
    </div>
    <div class="pb-section">
      <div class="pb-section-title">Execution Plan</div>
      <ol class="pb-steps">${stepsHtml}</ol>
    </div>
  `;
}

function renderPage(data) {
  document.title = `${data.quarter} Performance Levers · Hinge Health`;
  document.getElementById('header-title').textContent =
    `${data.quarter} Performance Levers · Week ${data.week}`;
  document.getElementById('header-meta').textContent = `Updated ${data.generated_at}`;

  const m = data.metrics;
  document.getElementById('m-okr').textContent = fmt(m.q2_okr);
  document.getElementById('m-outlook').textContent = fmt(m.q2_outlook);
  document.getElementById('m-outlook-calc').textContent =
    `${fmt(m.cumulative)} cumulative + ${m.remaining_weeks} wks × ${fmt(m.forecast_rate)}/wk`;

  const gapEl   = document.getElementById('m-gap');
  const badgeEl = document.getElementById('m-gap-badge');
  gapEl.textContent = fmtSign(m.gap);
  gapEl.className   = 'value ' + (m.gap >= 0 ? 'gap-positive' : 'gap-negative');

  if (m.gap_pct >= 0) {
    badgeEl.textContent = `+${m.gap_pct}% · On Track`;
    badgeEl.className   = 'badge badge-green';
  } else if (m.gap_pct >= -2) {
    badgeEl.textContent = `${m.gap_pct}% · Watch`;
    badgeEl.className   = 'badge badge-yellow';
  } else {
    badgeEl.textContent = `${m.gap_pct}% · At Risk`;
    badgeEl.className   = 'badge badge-red';
  }

  // Touchpoints
  const tp = data.touchpoints;
  document.getElementById('touchpoints-body').innerHTML = `
    <tr>
      <td>Email</td>
      <td class="num">${fmt(tp.email.touchpoints)}</td>
      <td class="num">${fmt(tp.email.shifted)}</td>
    </tr>
    <tr>
      <td>Direct Mail</td>
      <td class="num">${fmt(tp.dm.touchpoints)}</td>
      <td class="num">${fmt(tp.dm.shifted)}</td>
    </tr>
    <tr class="total-row">
      <td>Total</td>
      <td class="num">${fmt(tp.email.touchpoints + tp.dm.touchpoints)}</td>
      <td class="num">${fmt(tp.email.shifted + tp.dm.shifted)}</td>
    </tr>
  `;

  // Y2 table
  const y2Body = document.getElementById('y2-body');
  if (data.y2_deferred && data.y2_deferred.length) {
    y2Body.innerHTML = data.y2_deferred
      .map(r => `<tr><td>${r.week}</td><td class="num">${fmt(r.volume)}</td></tr>`)
      .join('');
  } else {
    y2Body.innerHTML = '<tr><td colspan="2" style="color:var(--text-muted)">No data yet — run weekly update</td></tr>';
  }

  // Lever cards
  allLevers    = data.levers;
  recommendedId = data.recommended_lever_id;

  document.getElementById('lever-list').innerHTML = data.levers.map(lever => {
    const isRec = lever.id === recommendedId;
    const urgencyClass = lever.workback_days > 0 && lever.workback_days <= 7
      ? 'chip-urgent' : 'chip-neutral';
    return `
      <div class="lever-card" id="lever-${lever.id}" onclick="selectLever('${lever.id}')">
        <div class="lever-name">${lever.name}</div>
        <div class="lever-subtitle">${lever.subtitle}</div>
        <div class="lever-chips">
          ${isRec ? '<span class="chip chip-rec">✓ Recommended</span>' : ''}
          <span class="chip ${urgencyClass}">${lever.urgency_label}</span>
        </div>
      </div>
    `;
  }).join('');

  selectLever(recommendedId);

  document.getElementById('footer').innerHTML =
    `Last updated ${data.generated_at} &nbsp;·&nbsp; ` +
    `<a href="https://docs.google.com/document/d/11IMQVDHFlnphjMKLfGa4wE99mgCjzDduBbzqXMLpIK4/edit" target="_blank">Google Doc</a>`;
}

fetch('data.json')
  .then(r => { if (!r.ok) throw new Error('data.json not found'); return r.json(); })
  .then(data => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderPage(data);
  })
  .catch(err => {
    document.getElementById('loading').textContent =
      'Could not load data.json — run the Python script first. (' + err.message + ')';
  });
</script>
</body>
</html>
